{% extends "base.html" %}
{% block content %}

<div class="container text-center py-5">

    <!-- Styled message box -->
    <div class="p-5 rounded shadow-sm"
         style="background-color:#FFE5E5; box-shadow:0 4px 12px rgba(211,47,47,0.2);">

        <h1 class="display-4 mb-3"
            style="color:#B71C1C; font-weight:700;">
            Sorry! No donations available
        </h1>

        <p style="color:#424242; font-size:1.2rem;">
            It looks like there are no blood donation events available right now.
        </p>

        <!-- Back button -->
        <div class="mt-4">
            <a onclick="history.back()"
               class="btn btn-lg"
               style="background-color:#D32F2F; color:#FFFFFF; font-weight:600; padding:0.75rem 2rem; border-radius:6px;">
                Back 
            </a>
        </div>

    </div>

</div>

{% endblock %}
