{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center min-vh-90">
    <div class="d-flex flex-column text-center p-5 shadow-sm rounded bg-white border" style="max-width: 500px; width: 100%;">
        
        <h1 class="display-1 fw-bold text-danger mb-0">{{ error_code }}</h1>
        
        <h2 class="h4 mb-4">Oops! Something went wrong.</h2>
        
        <p class="text-muted mb-4">
            {{ error_message }}
        </p>

        <hr>

        <a href="{{ url_for('home') }}" class="btn btn-primary w-100">
            <i class="fas fa-home me-2"></i>Return to Dashboard
        </a>

        <p class="small text-muted mt-3 mb-0">
            If you think this is a mistake, please contact our support team.
        </p>
        
    </div>
</div>
{% endblock %}
