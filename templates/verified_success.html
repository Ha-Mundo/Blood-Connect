{% extends "base.html" %}
{% block content %}
<div class="container text-center mt-5">
    <div class="card shadow p-5 border-0">
        <h1 class="display-5 text-success">✅ Email Verified!</h1>
        <p class="lead mt-3">Your account is now active. You can safely close this tab and return to your original window.</p>
        <hr class="my-4">
        <p>Alternatively, if you closed the other window, click below:</p>
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">Go to Login</a>
    </div>
</div>
{% endblock %}
