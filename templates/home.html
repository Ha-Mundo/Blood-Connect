{% extends "base.html" %}
{% block content %}

    
<div class="container text-center">

    <div class="main jumbotron jumbotron-fluid">
        <img src="/static/BDS.png" class="blogo">
        <h2 class="display-4 header">Blood Donation System</h2>
    </div>

        <div class="flash text-center">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
        
                {% for category, mess in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    <span>{{ mess }}</span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close" class="fade close">
                    <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

    <form action="/home" method='POST', class='ui form select' style='width: 100%;'>

                    <div class="row justify-content-center">

                        <div class = "col-lg-3 col-lg-offset-2">
                            <a class="btn-d icon-box" href='/blood_donation'> 
                            <img src="/static/blood-donation.png" class="b-icons">
                            <h2>Blood donation</h2>
                            </a>
                            
                        </div>
    
                        <div class = "col-lg-3 col-lg-offset-2">
                            
                            <a class="btn-r icon-box" href='/blood_receive'>
                            <img src="/static/blood-request.png" class="b-icons">
                            <h2>Blood receive</h2>
                            </a>
                            
                        </div>

                    </div>
    </form>     
</div>
                    
{% endblock %}
